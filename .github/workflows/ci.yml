name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff bandit

    - name: Run Ruff Lint Check
      run: ruff check .

    - name: Run Ruff Format Check
      run: ruff format --check .

    - name: Run Bandit Security Check
      # We target our backend python file. We ignore B603/B404/B607/B110 since subprocess/nmcli wrapper is needed and try-except-pass is used for network fallbacks.
      run: bandit -r contents/ui/backend.py --skip B404,B603,B607,B110

    - name: Validate metadata.json
      run: python3 -m json.tool metadata.json
